name: Job Alert

on:
  schedule:
    # Runs once daily at 9:00 AM IST (3:30 AM UTC)
    - cron: "30 3 * * *"
  workflow_dispatch:   # Allows manual trigger from GitHub UI

jobs:
  check-jobs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Cache the SQLite DB between runs using GitHub Actions cache
      - name: Restore job database
        uses: actions/cache@v4
        with:
          path: jobs.db
          key: jobs-db-${{ github.run_id }}
          restore-keys: |
            jobs-db-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Write config (with secrets from GitHub Secrets)
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          WHATSAPP_FROM: ${{ secrets.WHATSAPP_FROM }}
          WHATSAPP_TO: ${{ secrets.WHATSAPP_TO }}
        run: |
          python - <<'EOF'
          import yaml, os

          with open("config.template.yaml") as f:
              cfg = yaml.safe_load(f)

          cfg["email"]["sender"]    = os.environ["EMAIL_SENDER"]
          cfg["email"]["password"]  = os.environ["EMAIL_PASSWORD"]
          cfg["email"]["recipient"] = os.environ["EMAIL_RECIPIENT"]

          cfg["whatsapp"]["account_sid"] = os.environ.get("TWILIO_ACCOUNT_SID", "")
          cfg["whatsapp"]["auth_token"]  = os.environ.get("TWILIO_AUTH_TOKEN", "")
          cfg["whatsapp"]["from_number"] = os.environ.get("WHATSAPP_FROM", "")
          cfg["whatsapp"]["to_number"]   = os.environ.get("WHATSAPP_TO", "")

          with open("config.yaml", "w") as f:
              yaml.dump(cfg, f)
          EOF

      - name: Run job check
        run: python main.py --once

      - name: Send digest
        run: python main.py --send-digest

      - name: Save updated database
        uses: actions/cache@v4
        with:
          path: jobs.db
          key: jobs-db-${{ github.run_id }}
